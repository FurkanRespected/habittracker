<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set Mission - MONOLITH</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#060e20",
              "surface": "#0b1326",
              "surface-container-low": "#131b2e",
              "surface-container": "#1c253d",
              "surface-container-high": "#242f4d",
              "surface-container-highest": "#2d3a5c",
              "primary": "#d97706", // Amber 600
              "on-primary": "#ffffff",
              "secondary": "#475569",
              "on-surface": "#f8fafc",
              "on-surface-variant": "#94a3b8",
              "outline": "#334155",
              "outline-variant": "#1e293b",
              "error": "#ef4444"
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.125rem", 
              "lg": "0.125rem", 
              "xl": "0.25rem", 
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
      }
      .discipline-gradient {
        background: linear-gradient(to right, #d97706 0%, #b45309 100%);
      }
      .industrial-mask {
        mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
      }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center p-4 md:p-8">
<!-- Modal Container -->
<main class="w-full max-w-5xl bg-surface border border-white/5 overflow-hidden flex flex-col md:flex-row shadow-[0_48px_100px_rgba(0,0,0,0.5)]">
<!-- Left Side: Form -->
<section class="flex-1 p-8 md:p-12 lg:p-16 bg-surface">
<header class="mb-10">
<div class="flex items-center gap-4 mb-3">
<span class="material-symbols-outlined text-primary text-4xl">shield</span>
<h1 class="font-headline text-3xl font-black uppercase tracking-tighter text-on-surface">Set Mission</h1>
</div>
<p class="text-on-surface-variant font-medium tracking-tight border-l-2 border-primary/30 pl-4 uppercase text-xs">Forging excellence through consistency.</p>
</header>
<form class="space-y-8">
<!-- Habit Name & Icon -->
<div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-4 items-end">
<div class="space-y-2">
<label class="font-headline font-bold text-[10px] uppercase tracking-widest text-on-surface-variant px-1">Mission Objective</label>
<input class="w-full h-14 px-4 bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface placeholder:text-secondary font-medium" placeholder="e.g., 05:00 WAKE UP" type="text"/>
</div>
<div class="space-y-2">
<label class="font-headline font-bold text-[10px] uppercase tracking-widest text-on-surface-variant px-1">Icon</label>
<button class="w-14 h-14 flex items-center justify-center bg-surface-container-low border border-outline-variant text-primary hover:bg-surface-container transition-colors" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</div>
</div>
<!-- Frequency -->
<div class="space-y-3">
<label class="font-headline font-bold text-[10px] uppercase tracking-widest text-on-surface-variant px-1">Operational Frequency</label>
<div class="flex flex-wrap gap-2">
<button class="px-8 py-3 bg-primary text-on-primary font-black text-xs uppercase tracking-widest transition-transform active:scale-95" type="button">Daily</button>
<button class="px-8 py-3 bg-surface-container-low text-on-surface-variant font-bold text-xs uppercase tracking-widest border border-outline-variant hover:border-secondary transition-colors" type="button">Weekly</button>
<button class="px-8 py-3 bg-surface-container-low text-on-surface-variant font-bold text-xs uppercase tracking-widest border border-outline-variant hover:border-secondary transition-colors" type="button">Strategic</button>
</div>
</div>
<!-- Target & Reminders -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="font-headline font-bold text-[10px] uppercase tracking-widest text-on-surface-variant px-1">Target Intensity</label>
<div class="relative flex items-center">
<input class="w-full h-14 px-4 bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface font-mono" type="number" value="1"/>
<span class="absolute right-4 text-on-surface-variant font-bold text-[10px] uppercase tracking-widest">reps / day</span>
</div>
</div>
<div class="space-y-2">
<label class="font-headline font-bold text-[10px] uppercase tracking-widest text-on-surface-variant px-1">Optional Reminder</label>
<div class="flex gap-2">
<div class="relative flex-1 flex items-center">
<input class="w-full h-14 px-4 bg-surface-container-low border border-outline-variant focus:border-primary focus:ring-0 transition-all text-on-surface font-mono disabled:opacity-30 disabled:cursor-not-allowed" id="reminder-time" type="time" value="05:00"/>
<span class="absolute right-4 material-symbols-outlined text-secondary">schedule</span>
</div>
<label class="flex items-center justify-center h-14 px-4 bg-surface-container-low border border-outline-variant cursor-pointer group hover:border-primary transition-colors">
<input class="hidden peer" onchange="document.getElementById('reminder-time').disabled = this.checked" type="checkbox"/>
<div class="flex flex-col items-center">
<span class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest peer-checked:text-primary group-hover:text-primary">Anytime</span>
<div class="w-4 h-1 bg-secondary mt-1 peer-checked:bg-primary transition-colors"></div>
</div>
</label>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-4 flex flex-col sm:flex-row items-center gap-4">
<button class="w-full sm:flex-1 h-16 discipline-gradient text-on-primary font-headline font-black text-sm uppercase tracking-[0.2em] shadow-2xl transition-all hover:brightness-110 active:scale-[0.98]" type="submit">Commit to Mission</button>
<button class="w-full sm:w-auto px-8 h-16 text-on-surface-variant font-headline font-bold text-xs uppercase tracking-widest hover:text-on-surface transition-colors" type="button">Abort</button>
</div>
</form>
</section>
<!-- Right Side: Preview & Encouragement -->
<aside class="w-full md:w-[400px] p-8 md:p-12 flex flex-col justify-between relative overflow-hidden bg-surface-container-low border-l border-white/5">
<div class="relative z-10">
<span class="inline-block px-3 py-1 bg-primary/10 text-primary font-headline font-black text-[10px] uppercase tracking-[0.3em] mb-8 border-l border-primary">Status: Initializing</span>
<!-- The "Discipline Card" Preview -->
<div class="bg-surface-container p-6 border border-white/5 shadow-2xl mb-10">
<div class="flex justify-between items-start mb-8">
<div class="w-14 h-14 bg-surface-container-highest flex items-center justify-center text-primary border border-primary/20">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<div class="text-right">
<span class="block font-headline font-black text-3xl text-on-surface tracking-tighter">0/1</span>
<span class="block text-[10px] font-black text-secondary uppercase tracking-[0.2em]">Executed</span>
</div>
</div>
<h3 class="font-headline font-black text-xl text-on-surface uppercase tracking-tight mb-4">05:00 Wake Up</h3>
<!-- Progress Bar -->
<div class="w-full h-1 bg-surface-container-highest overflow-hidden mb-6">
<div class="h-full w-[15%] bg-primary"></div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm">military_tech</span>
<span class="text-[10px] font-black text-on-surface-variant uppercase tracking-widest">New Protocol</span>
</div>
</div>
<!-- Editorial Quote -->
<div class="space-y-6">
<h2 class="font-headline text-3xl font-black text-on-surface leading-[0.9] uppercase tracking-tighter italic">Hard choices,<br/>easy life.</h2>
<div class="h-0.5 w-12 bg-primary"></div>
<p class="text-on-surface-variant text-xs font-medium leading-relaxed uppercase tracking-widest opacity-80">
                    "Discipline is the bridge between goals and accomplishment."
                </p>
</div>
</div>
<!-- Industrial Atmosphere Image -->
<div class="mt-12 -mx-12 -mb-12 relative h-64 grayscale contrast-125 opacity-30 mix-blend-lighten">
<img alt="Abstract industrial architecture with high contrast shadows and sharp metal edges" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCaghLGeJa_z3016jjfkrritK3Q31OQA6uJm6eBNx3k1-WcmVAiEYyVnmdf1YRTzTLAiYymK9JAf-H_EAWD3uOMm60485NfixPt_iFFlOP3zsRZgRmq4NFWKucFISE-tQhFUWv01gpN5T94W0YCuUu08VYWgfMo9DKCfcD6c4m7q2Z0YOYyzi9ITmUNwya8wYGJZoDqAJLLEBuJEf-2XfF824gFwRYS7lef7kNH0Aczt_AGpWVmuLHb1b7MUPQl2QAUChGhzi3OoqC"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-low via-transparent to-transparent"></div>
</div>
</aside>
</main>
</body></html>
